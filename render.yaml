services:
  # Backend API
  - type: web
    name: lentilha-backend
    env: docker
    repo: https://github.com/SEU_USUARIO/lentilha # Altere para o seu repositório
    rootDir: backend
    plan: free
    healthCheckPath: /foods/search?query=a # Rota simples para check
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lentilha-db
          property: connectionString
      - key: PORT
        value: 8000

  # Frontend (Next.js)
  - type: web
    name: lentilha-frontend
    env: node
    repo: https://github.com/SEU_USUARIO/lentilha # Altere para o seu repositório
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: lentilha-backend
          property: host

databases:
  - name: lentilha-db
    databaseName: lentilha
    user: user
    plan: free
