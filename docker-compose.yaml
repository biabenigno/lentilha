version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    image: lentilha_backend:v1.0.0
    container_name: lentilha_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:13
    container_name: lentilha_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lentilha
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d lentilha"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
